name: Status Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts
        env:
          ONNXRUNTIME_NODE_INSTALL_CUDA: "0"

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
