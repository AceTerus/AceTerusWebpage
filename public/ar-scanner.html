<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AR Scanner | AceTerus</title>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800;900&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cyan:       #3BD6F5;
      --blue:       #2F7CFF;
      --indigo:     #2E2BE5;
      --ink:        #0F172A;
      --sky-soft:   #DDF3FF;
      --indigo-soft:#D6D4FF;
      --cloud:      #F3FAFF;
      --sun:        #FFD65C;
      --pop:        #FF7A59;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: #000;
      color: var(--ink);
      min-height: 100vh;
      overflow: hidden;
    }

    a-scene {
      position: fixed !important;
      top: 0; left: 0;
      width: 100vw !important;
      height: 100vh !important;
      z-index: 0;
    }

    /* Camera feed fills screen without letterboxing.
       transform is intentionally left unset — MindAR controls
       the video transform to keep its WebGL overlay aligned. */
    video {
      object-fit: cover !important;
      width: 100vw !important;
      height: 100vh !important;
      position: absolute !important;
      top: 0 !important; left: 0 !important;
    }

    .mindar-ui-overlay, [class*="mindar"] {
      width: 100vw !important;
      height: 100vh !important;
    }

    /* ── Back button ── */
    .back-btn {
      position: fixed; top: 20px; left: 20px; z-index: 100;
      display: none; align-items: center; gap: 7px;
      background: white;
      border: 2.5px solid var(--ink);
      color: var(--ink);
      padding: 9px 18px;
      border-radius: 999px;
      font-family: 'Baloo 2', sans-serif;
      font-weight: 800; font-size: .88rem;
      cursor: pointer;
      box-shadow: 3px 3px 0 0 var(--ink);
      transition: transform .15s, box-shadow .15s;
      text-decoration: none;
    }
    .back-btn.visible { display: flex; }
    .back-btn:hover  { transform: translateY(-2px); box-shadow: 4px 5px 0 0 var(--ink); }
    .back-btn:active { transform: translateY(1px);  box-shadow: 1px 1px 0 0 var(--ink); }

    /* ── Logo badge (visible while scanning) ── */
    .logo-badge {
      position: fixed; top: 20px; right: 20px; z-index: 100;
      display: none; align-items: center; gap: 8px;
      background: white;
      border: 2.5px solid var(--ink);
      box-shadow: 3px 3px 0 0 var(--ink);
      padding: 6px 14px 6px 8px;
      border-radius: 999px;
    }
    .logo-badge.visible { display: flex; }
    .logo-badge img {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 2px solid var(--ink);
      object-fit: contain;
    }
    .logo-badge span {
      font-family: 'Baloo 2', sans-serif;
      font-weight: 900; font-size: .88rem;
      color: var(--ink);
    }

    /* ── Scan-frame corners ── */
    .scan-corner {
      position: fixed; z-index: 90;
      width: 38px; height: 38px;
      pointer-events: none; opacity: 0;
      transition: opacity .5s;
    }
    .scan-corner.top-left    { top: 80px; left: 24px; }
    .scan-corner.top-right   { top: 80px; right: 24px;   transform: rotate(90deg); }
    .scan-corner.bottom-left { bottom: 32px; left: 24px;  transform: rotate(270deg); }
    .scan-corner.bottom-right{ bottom: 32px; right: 24px; transform: rotate(180deg); }
    .scan-corner.visible { opacity: 1; }

    /* ── Status pill (searching) ── */
    #scan-status {
      position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
      z-index: 100; display: flex; align-items: center; gap: 8px;
      background: var(--ink);
      border: 2.5px solid var(--ink);
      box-shadow: 3px 3px 0 0 rgba(255,255,255,.2);
      padding: 10px 22px; border-radius: 999px;
      font-family: 'Baloo 2', sans-serif;
      font-weight: 800; font-size: .85rem; color: white;
      opacity: 0; pointer-events: none;
      transition: opacity .4s;
      white-space: nowrap;
    }
    #scan-status.visible { opacity: 1; }

    .pulse-dot {
      width: 9px; height: 9px; border-radius: 50%;
      background: var(--cyan);
      animation: pulseDot 1.4s ease-in-out infinite;
      flex-shrink: 0;
    }

    /* ── Active target badge ── */
    #active-badge {
      position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
      z-index: 100;
      background: var(--cyan);
      border: 2.5px solid var(--ink);
      box-shadow: 3px 3px 0 0 var(--ink);
      padding: 10px 22px; border-radius: 999px;
      font-family: 'Baloo 2', sans-serif;
      font-weight: 800; font-size: .88rem; color: var(--ink);
      display: flex; align-items: center; gap: 8px;
      opacity: 0; pointer-events: none;
      transition: opacity .4s;
      white-space: nowrap;
    }
    #active-badge.visible { opacity: 1; }

    /* ── Intro overlay ── */
    #scanning-overlay {
      position: fixed; inset: 0; z-index: 50;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: rgba(15, 23, 42, 0.45);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
      transition: opacity .5s ease, visibility .5s;
    }
    #scanning-overlay.hidden {
      opacity: 0; visibility: hidden; pointer-events: none;
    }

    /* grain */
    #scanning-overlay::before { content: none; }

    /* subtle decorative rings */
    .rings {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
    }
    .ring {
      position: absolute; border-radius: 50%;
      border: 1.5px solid rgba(47,124,255,.09);
    }

    /* ── Instruction card ── */
    .instruction-card {
      position: relative; z-index: 1;
      background: white;
      border: 3px solid var(--ink);
      border-radius: 28px;
      padding: 36px 30px 30px;
      text-align: center;
      max-width: 360px; width: 90%;
      box-shadow: 6px 6px 0 0 var(--ink);
      animation: cardIn .55s cubic-bezier(.34,1.56,.64,1) both;
    }

    .card-logo {
      width: 68px; height: 68px;
      border-radius: 20px;
      border: 3px solid var(--ink);
      box-shadow: 4px 4px 0 0 var(--ink);
      object-fit: contain;
      margin: 0 auto 16px;
      display: block;
      animation: floatSlow 4s ease-in-out infinite;
    }

    .instruction-card h2 {
      font-family: 'Baloo 2', sans-serif;
      font-size: 1.85rem; font-weight: 900;
      color: var(--ink);
      letter-spacing: -.025em;
      line-height: 1; margin-bottom: 6px;
    }

    .instruction-card p {
      color: #64748b; font-size: .875rem;
      line-height: 1.6; margin-bottom: 18px;
    }

    /* ── Target chips ── */
    .target-chips {
      display: flex; gap: 7px;
      justify-content: center;
      margin-bottom: 18px; flex-wrap: wrap;
    }
    .chip {
      display: inline-flex; align-items: center; gap: 5px;
      border: 2.5px solid var(--ink);
      border-radius: 999px;
      padding: 4px 13px;
      font-size: .78rem; font-weight: 800;
      color: var(--ink);
      box-shadow: 2px 2px 0 0 var(--ink);
    }
    .chip:nth-child(1) { background: #FFE4E4; }
    .chip:nth-child(2) { background: var(--indigo-soft); }
    .chip:nth-child(3) { background: var(--sky-soft); }

    /* ── Steps ── */
    .steps {
      display: flex; flex-direction: column;
      gap: 8px; margin-bottom: 22px;
      text-align: left;
    }
    .step {
      display: flex; align-items: center; gap: 12px;
      background: var(--cloud);
      border: 2px solid var(--ink);
      border-radius: 14px;
      padding: 10px 14px;
      box-shadow: 2px 2px 0 0 var(--ink);
    }
    .step-num {
      width: 26px; height: 26px; border-radius: 50%;
      border: 2px solid var(--ink);
      font-weight: 900; font-size: .76rem;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .step:nth-child(1) .step-num { background: var(--cyan);   color: var(--ink); }
    .step:nth-child(2) .step-num { background: var(--blue);   color: white; }
    .step:nth-child(3) .step-num { background: var(--indigo); color: white; }
    .step span { font-size: .84rem; font-weight: 700; color: var(--ink); }

    /* ── Start button ── */
    #start-btn {
      width: 100%; padding: 14px 24px;
      background: var(--blue); color: white;
      border: 3px solid var(--ink);
      border-radius: 999px;
      font-family: 'Baloo 2', sans-serif;
      font-weight: 900; font-size: 1rem;
      cursor: pointer;
      box-shadow: 4px 4px 0 0 var(--ink);
      transition: transform .15s, box-shadow .15s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    #start-btn:hover  { transform: translateY(-3px); box-shadow: 6px 7px 0 0 var(--ink); }
    #start-btn:active { transform: translateY(1px);  box-shadow: 2px 2px 0 0 var(--ink); }
    #start-btn:disabled { opacity: .55; cursor: not-allowed; transform: none; box-shadow: 4px 4px 0 0 var(--ink); }

    /* ── Keyframes ── */
    @keyframes cardIn   {
      0%   { opacity:0; transform: scale(.88) translateY(20px); }
      100% { opacity:1; transform: scale(1)   translateY(0); }
    }
    @keyframes floatSlow { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    @keyframes pulseDot  { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.6);opacity:.5} }
  </style>
</head>
<body>

  <a href="javascript:history.back()" class="back-btn" id="back-btn">
    ← Back
  </a>

  <div class="logo-badge" id="logo-badge">
    <img src="/transparentlogo.png" alt="AceTerus"/>
    <span>AceTerus</span>
  </div>

  <div class="scan-corner top-left"     id="c1"><svg viewBox="0 0 38 38" fill="none"><path d="M3 19 L3 3 L19 3" stroke="#3BD6F5" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
  <div class="scan-corner top-right"    id="c2"><svg viewBox="0 0 38 38" fill="none"><path d="M3 19 L3 3 L19 3" stroke="#3BD6F5" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
  <div class="scan-corner bottom-left"  id="c3"><svg viewBox="0 0 38 38" fill="none"><path d="M3 19 L3 3 L19 3" stroke="#3BD6F5" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
  <div class="scan-corner bottom-right" id="c4"><svg viewBox="0 0 38 38" fill="none"><path d="M3 19 L3 3 L19 3" stroke="#3BD6F5" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>

  <div id="scan-status">
    <div class="pulse-dot"></div>
    <span id="status-text">Point at an AceTerus print…</span>
  </div>

  <div id="active-badge">
    <span id="badge-icon">✨</span>&nbsp;<span id="badge-text">Print recognised!</span>
  </div>

  <!-- INTRO OVERLAY -->
  <div id="scanning-overlay">
    <div class="rings">
      <div class="ring" style="width:260px;height:260px"></div>
      <div class="ring" style="width:400px;height:400px;opacity:.6"></div>
      <div class="ring" style="width:540px;height:540px;opacity:.35"></div>
      <div class="ring" style="width:680px;height:680px;opacity:.15"></div>
    </div>

    <div class="instruction-card">
      <img class="card-logo" src="/transparentlogo.png" alt="AceTerus"/>
      <h2>AR Scanner 🔬</h2>
      <p>Point your camera at any AceTerus print and watch it come alive in 3D.</p>

      <div class="target-chips">
        <div class="chip">♥ Heart</div>
        <div class="chip">☠ Skull</div>
        <div class="chip">◈ Body</div>
      </div>

      <div class="steps">
        <div class="step"><div class="step-num">1</div><span>Allow camera access when prompted</span></div>
        <div class="step"><div class="step-num">2</div><span>Point at any of your 3 prints</span></div>
        <div class="step"><div class="step-num">3</div><span>Hold the print steady in frame</span></div>
      </div>

      <button id="start-btn">🚀 Launch AR Scanner</button>
    </div>
  </div>

  <!--
    IMPORTANT: targets.mind must be compiled from all 3 images in order:
      index 0 = heart image
      index 1 = skull image
      index 2 = body image

    Use the MindAR compiler at https://hiukim.github.io/mind-ar-js-doc/tools/compile
    Upload all 3 images at once and download the single targets.mind file.

    All 3 targets are tracked simultaneously — no switching required.
  -->
  <a-scene
    id="ar-scene"
    mindar-image="imageTargetSrc: ./targets.mind; filterMinCF: 0.001; filterBeta: 0.01; uiLoading: no; uiScanning: no; uiError: no;"
    color-space="sRGB"
    renderer="colorManagement: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    embedded>

    <a-assets>
      <a-asset-item id="heart-model" src="./heart.glb"></a-asset-item>
      <a-asset-item id="skull-model" src="./skull.glb"></a-asset-item>
      <a-asset-item id="body-model"  src="./body.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- Target 0: Heart -->
    <a-entity id="target-heart" mindar-image-target="targetIndex: 0">
      <a-gltf-model
        src="#heart-model"
        position="0 0 0.2"
        scale="0.7 0.7 0.7"
        rotation="90 0 0">
      </a-gltf-model>
    </a-entity>

    <!-- Target 1: Skull -->
    <a-entity id="target-skull" mindar-image-target="targetIndex: 1">
      <a-gltf-model
        src="#skull-model"
        position="0 0 0.2"
        scale="0.7 0.7 0.7"
        rotation="90 0 0">
      </a-gltf-model>
    </a-entity>

    <!-- Target 2: Body -->
    <a-entity id="target-body" mindar-image-target="targetIndex: 2">
      <a-gltf-model
        src="#body-model"
        position="0 0 0.0"
        scale="10 10 10"
        rotation="90 0 0">
      </a-gltf-model>
    </a-entity>

  </a-scene>

  <script>
    const TARGETS = [
      { id: 'target-heart', name: 'Heart', icon: '♥' },
      { id: 'target-skull', name: 'Skull', icon: '☠' },
      { id: 'target-body',  name: 'Body',  icon: '◈' },
    ];

    const overlay    = document.getElementById('scanning-overlay');
    const startBtn   = document.getElementById('start-btn');
    const statusPill = document.getElementById('scan-status');
    const badge      = document.getElementById('active-badge');
    const badgeIcon  = document.getElementById('badge-icon');
    const badgeText  = document.getElementById('badge-text');
    const corners    = ['c1','c2','c3','c4'].map(id => document.getElementById(id));

    let visibleTargets = new Set();

    function updateBadge() {
      if (visibleTargets.size === 0) {
        badge.classList.remove('visible');
        statusPill.classList.add('visible');
      } else {
        statusPill.classList.remove('visible');
        badge.classList.add('visible');
        const names = [...visibleTargets].map(n => {
          const t = TARGETS.find(x => x.name === n);
          return t ? t.icon + ' ' + t.name : n;
        });
        badgeIcon.textContent = '✨';
        badgeText.textContent = names.join(' · ') + ' — watch it come alive!';
      }
    }

    function bindTargetEvents() {
      TARGETS.forEach(t => {
        const el = document.getElementById(t.id);
        if (!el) return;
        el.addEventListener('targetFound', () => { visibleTargets.add(t.name);    updateBadge(); });
        el.addEventListener('targetLost',  () => { visibleTargets.delete(t.name); updateBadge(); });
      });
    }

    startBtn.addEventListener('click', () => {
      startBtn.disabled = true;
      startBtn.textContent = 'Starting camera…';
      overlay.classList.add('hidden');
      corners.forEach(c => c.classList.add('visible'));
      statusPill.classList.add('visible');
      document.getElementById('back-btn').classList.add('visible');
      document.getElementById('logo-badge').classList.add('visible');
      bindTargetEvents();
    });
  </script>
</body>
</html>
